# Базы данных для приложений с Ollama (RAG, боты, кэш).
# Ollama обычно остаётся на хосте (GPU). Подключение: host.docker.internal или IP хоста.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ollama-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ollama_app
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: ollama_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backups:/var/lib/postgresql/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama_app -d ollama_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ollama-stack-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # RAG: знания в Postgres, эмбеддинги и ответ — через Ollama на хосте (офлайн).
  # Меньший образ без LibreOffice: dockerfile: Dockerfile.slim и убрать LIBREOFFICE_* из environment.
  rag-api:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: ollama-stack-rag
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://ollama_app:changeme@postgres:5432/ollama_app
      REDIS_URL: redis://redis:6379/0
      LIBREOFFICE_SOFFICE_PATH: /usr/bin/soffice
      LIBREOFFICE_CONVERT_TIMEOUT_SEC: "120"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_BASE: http://host.docker.internal:11434
      EMBEDDING_MODEL: nomic-embed-text
      EMBED_MODEL: nomic-embed-text
      OLLAMA_MODEL: llama3:8b
      OLLAMA_CHAT_MODEL: llama3:8b
      RAG_TOP_K: 12
      RAG_FINAL_K: 6
      RAG_MODE_DEFAULT: balanced
      LOG_LEVEL: INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./rag-service/data/knowledge:/app/data/knowledge
      - ./rag-service/tools:/app/tools
      - rag-logs:/app/logs
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend ГрузПотока: интеграционный слой к rag-api (Telegram / Mini App / Web).
  gruzpotok-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollama-stack-gruzpotok-backend
    restart: unless-stopped
    depends_on:
      rag-api:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      RAG_API_BASE_URL: http://rag-api:8080
      RAG_API_TIMEOUT_SEC: 120
      RAG_API_ENABLED: "true"
      RAG_API_DEBUG_DEFAULT: "false"
      RAG_API_RETRY_COUNT: 2
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://ollama_app:changeme@postgres:5432/ollama_app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-logs:/app/logs
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/v1/internal/ai/calls || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backup сервис: автоматические резервные копии PostgreSQL
  postgres-backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: ollama-stack-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ollama_app
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: ollama_app
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - backups:/var/lib/postgresql/backups
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ollama-stack-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Monitoring: PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ollama-stack-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://ollama_app:changeme@postgres:5432/ollama_app?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Monitoring: Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ollama-stack-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ollama-stack-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  backups:
    driver: local
  redisdata:
    driver: local
  rag-logs:
    driver: local
  backend-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-storage:
    driver: local

networks:
  default:
    driver: bridge
