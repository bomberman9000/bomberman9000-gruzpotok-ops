name: CI

on:
  push:
    branches: [main, master, develop, "tfk/**"]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  rag-service:
    name: RAG service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: rag-service/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  react-doctor-report:
    name: React Doctor Report (operator UI) — report-only
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run React Doctor
        run: npm run doctor:report
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: react-doctor-report-operator-ui
          path: frontend/reports/react-doctor-report.txt
          retention-days: 30
