# Пример: операторский UI (Vite build) + прокси API на backend.
# Сборка: cd frontend && npm run build
# Приложение под префиксом /operator: npm run build -- --base=/operator/
#
# upstream backend { server 127.0.0.1:8090; }

server {
    listen 80;
    server_name _;

    # root /var/www/gruzpotok-operator-ui/dist;
    # location /operator/ {
    #     try_files $uri $uri/ /operator/index.html;
    # }

    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # При INTERNAL_AUTH_ENABLED клиент шлёт X-Internal-Token — прокси должен пробрасывать:
        proxy_pass_request_headers on;
    }

    location /internal/ops/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:8090/health;
    }

    location /ready {
        proxy_pass http://127.0.0.1:8090/ready;
    }
}
